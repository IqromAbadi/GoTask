app = "gotask-api"
primary_region = "sin"  # Singapore (paling dekat ke Indonesia)

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV = "production"
  APP_PORT = "8080"
  CORS_ALLOWED_ORIGINS = "*"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    method = "GET"
    path = "/health"
