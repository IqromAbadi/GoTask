version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: gotask-postgres
    environment:
      POSTGRES_USER: gotask
      POSTGRES_PASSWORD: gotask
      POSTGRES_DB: gotask
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gotask -d gotask"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - gotask-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gotask-api
    ports:
      - "8080:8080"
    environment:
      APP_ENV: development
      APP_PORT: 8080
      DATABASE_URL: postgres://gotask:gotask@postgres:5432/gotask?sslmode=disable
      JWT_ACCESS_SECRET: change-me-in-production
      JWT_REFRESH_SECRET: change-me-in-production-refresh
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 720h
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gotask-network

volumes:
  postgres_data:

networks:
  gotask-network:
    driver: bridge
